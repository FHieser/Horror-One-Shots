<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Characters — Close to God</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; font-family: Georgia, serif; }
    header { background: #0a0000; border-bottom: 2px solid #330000; padding: 0.5rem 1.5rem; display: flex; align-items: center; gap: 2rem; position: sticky; top: 0; z-index: 10; }
    .brand { color: #666; font-size: 0.8rem; text-decoration: none; font-family: 'Courier New', monospace; letter-spacing: 0.08em; text-transform: uppercase; }
    .brand:hover { color: #cc2222; }
    .brand-sep { color: #330000; margin: 0 0.3rem; }
    .adv-brand { color: #cc2222; font-size: 1.1rem; letter-spacing: 0.05em; text-decoration: none; font-family: Georgia, serif; }
    nav { display: flex; margin-left: auto; }
    nav a { color: #666; text-decoration: none; font-size: 0.82rem; padding: 0.3rem 1rem; border: 1px solid transparent; letter-spacing: 0.06em; text-transform: uppercase; }
    nav a:hover { color: #cc2222; }
    nav a.active { color: #cc2222; border-color: #330000; background: #1a0000; }
    nav a + a { border-left: none; }
    .content { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
    h1 { color: #cc2222; font-size: 1.8rem; border-bottom: 2px solid #330000; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th { text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; font-family: 'Courier New', monospace; padding: 0.5rem 1rem; border-bottom: 1px solid #330000; }
    td { padding: 0.6rem 1rem; border-bottom: 1px solid #1a1a1a; font-size: 0.88rem; color: #b8b8b8; vertical-align: middle; }
    tr:hover td { background: #111; }
    .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
    .dim { color: #333; }
    .look-line { line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="../">Horror One-Shots</a>
    <span class="brand-sep">/</span>
    <a class="adv-brand" href="./">Close to God</a>
    <nav>
      <a href="./overview.html">Overview</a>
      <a href="./index.html">Map</a>
      <a href="./mechanics.html">Mechanics</a>
      <a href="./timeline.html">Timeline</a>
      <a href="./characters.html" class="active">Characters</a>
      <a href="./audio.html">Audio</a>
    </nav>
  </header>
  <div class="content">
    <h1>Characters</h1>
    <table>
      <thead>
        <tr>
          <th>Colour</th><th>Class</th><th>Skills</th><th>Item</th><th>Looks</th>
        </tr>
      </thead>
      <tbody id="char-tbody"><tr><td colspan="5" style="color:#444;font-family:'Courier New',monospace;font-size:0.8rem">LOADING…</td></tr></tbody>
    </table>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="./js/content-index.js"></script>
  <script src="./js/app.js"></script>
  <script>initCharacters().catch(e => { document.getElementById('char-tbody').innerHTML = '<tr><td colspan="5">Error: ' + e.message + '</td></tr>'; });</script>
</body>
</html>
