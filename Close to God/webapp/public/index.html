<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Close to God — Facility Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #c9c9c9;
      font-family: 'Georgia', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #0a0000;
      border-bottom: 2px solid #330000;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    header h1 { color: #cc2222; font-size: 1.2rem; letter-spacing: 0.05em; }

    #map-area {
      flex: 1;
      overflow: auto;
      background: #080808;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
    }

    #map-wrapper svg {
      max-height: calc(100vh - 62px);
      width: auto;
      display: block;
    }

    /* SVG hover effects (applied once SVG is inlined) */
    .room-link { cursor: pointer; }
    .room-link:hover .r { fill: #1a3a55; }
    .room-link:hover .t { fill: #d0f0ff; }
    .room-link.hidden-room:hover .r { fill: #0f2030; }
    .room-link.hidden-room:hover .t { fill: #90ccdd; }
    .room-link.tower-link:hover .r { fill: #1a3050; }
    .room-link.tower-link:hover .p { fill: #1a3050; }
    .room-link.tower-link:hover .t { fill: #d0f0ff; }
  </style>
</head>
<body>

<header>
  <h1>Close to God — Facility Map</h1>
</header>

<div id="map-area">
  <div id="map-wrapper"></div>
</div>

<script>
  fetch('/images/Map.svg')
    .then(r => r.text())
    .then(svg => {
      document.getElementById('map-wrapper').innerHTML = svg;
    });
</script>
</body>
</html>
