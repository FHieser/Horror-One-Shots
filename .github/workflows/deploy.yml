name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Regenerate content-index.js
        run: node .github/scripts/generate-index.js

      - name: Stage _site/
        run: |
          mkdir -p _site/close-to-god/js _site/the-door/js _site/on-route-to-chaos

          # Root landing page + shared assets
          cp index.html _site/
          cp favicon.svg _site/

          # Close to God — HTML pages and JS (source lives in "Close to God/", deployed as "close-to-god/")
          cp "Close to God/index.html"      _site/close-to-god/
          cp "Close to God/overview.html"   _site/close-to-god/
          cp "Close to God/mechanics.html"  _site/close-to-god/
          cp "Close to God/characters.html" _site/close-to-god/
          cp "Close to God/timeline.html"   _site/close-to-god/
          cp "Close to God/audio.html"      _site/close-to-god/
          cp "Close to God/room.html"       _site/close-to-god/
          cp "Close to God/js/app.js"           _site/close-to-god/js/
          cp "Close to God/js/content-index.js" _site/close-to-god/js/

          # YAML data (fetched at runtime by the browser)
          cp -r "Close to God/rooms"       _site/close-to-god/rooms
          cp -r "Close to God/data"        _site/close-to-god/data
          cp "Close to God/layout.json"    _site/close-to-god/layout.json
          cp "Close to God/mechanics.md"   _site/close-to-god/mechanics.md
          cp "Close to God/header.md"      _site/close-to-god/header.md

          # The Door — full webapp
          cp "the-door/index.html"          _site/the-door/
          cp "the-door/overview.html"       _site/the-door/
          cp "the-door/mechanics.html"      _site/the-door/
          cp "the-door/characters.html"     _site/the-door/
          cp "the-door/timeline.html"       _site/the-door/
          cp "the-door/audio.html"          _site/the-door/
          cp "the-door/room.html"           _site/the-door/
          cp "the-door/js/app.js"           _site/the-door/js/
          cp "the-door/js/content-index.js" _site/the-door/js/
          cp -r "the-door/rooms"            _site/the-door/rooms
          cp -r "the-door/data"             _site/the-door/data
          cp "the-door/layout.json"         _site/the-door/layout.json
          cp "the-door/introduction.md"     _site/the-door/introduction.md
          cp "the-door/entity-the-door.md"  _site/the-door/entity-the-door.md

          # Placeholder pages
          cp "On route to chaos/index.html" _site/on-route-to-chaos/

      - uses: actions/configure-pages@v4
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
