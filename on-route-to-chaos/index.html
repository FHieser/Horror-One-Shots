<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On Route to Chaos — Horror One-Shots</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #c9c9c9; font-family: Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #0a0000; border-bottom: 2px solid #330000; padding: 0.5rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .brand { color: #666; font-size: 0.8rem; text-decoration: none; font-family: 'Courier New', monospace; letter-spacing: 0.08em; text-transform: uppercase; }
    .brand:hover { color: #cc2222; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; }
    .card { max-width: 480px; text-align: center; }
    .status { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.2em; font-family: 'Courier New', monospace; color: #444; border: 1px solid #222; padding: 0.2rem 0.8rem; display: inline-block; margin-bottom: 1.5rem; }
    h1 { color: #444; font-size: 2.5rem; margin-bottom: 1rem; }
    p { color: #333; font-size: 0.9rem; line-height: 1.7; margin-bottom: 2rem; font-style: italic; }
    .back { color: #555; text-decoration: none; font-size: 0.78rem; font-family: 'Courier New', monospace; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid #222; padding: 0.4rem 1rem; }
    .back:hover { color: #cc2222; border-color: #330000; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="../">← Horror One-Shots</a>
  </header>
  <main>
    <div class="card">
      <div class="status">Coming Soon</div>
      <h1>On Route to Chaos</h1>
      <p>A luxury cruise ship. Something has come aboard.<br>Not everyone will disembark.</p>
      <a class="back" href="../">Return to Adventures</a>
    </div>
  </main>
</body>
</html>
