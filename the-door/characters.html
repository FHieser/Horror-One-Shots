<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050400; font-family: Georgia, serif; }
    header { background: #060500; border-bottom: 2px solid #2a1800; padding: 0.5rem 1.5rem; display: flex; align-items: center; gap: 2rem; position: sticky; top: 0; z-index: 10; }
